apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  # Single instance — bump to 3 for HA when the app has real traffic.
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16.6

  # Superuser secret must exist in the namespace before applying this.
  # See deploy/README.md for the create command.
  superuserSecret:
    name: postgres-superuser

  bootstrap:
    initdb:
      database: project_f
      owner: project_f
      # Owner password is generated by CNPG and stored in a k8s Secret named "postgres-app".
      # Consume it from your app via valueFrom.secretKeyRef.

  storage:
    storageClass: local-path
    size: 20Gi

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  # Enable when you have Prometheus/Grafana in the cluster.
  monitoring:
    enablePodMonitor: false
