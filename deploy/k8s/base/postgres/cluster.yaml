apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  # Single instance — bump to 3 for HA when the app has real traffic.
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16.6

  # Superuser secret must exist in the namespace before applying this.
  # See deploy/README.md for the create command.
  superuserSecret:
    name: postgres-superuser

  bootstrap:
    initdb:
      database: project_f
      owner: project_f
      # Owner password is generated by CNPG and stored in a k8s Secret named "postgres-app".
      # Consume it from your app via valueFrom.secretKeyRef.

  storage:
    storageClass: local-path
    size: 20Gi

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  # Continuous WAL archiving + daily base backups to OCI Object Storage (S3-compatible).
  # The `postgres-backup-s3` secret must exist in the namespace before this reconciles.
  # `destinationPath` is a placeholder; each overlay patches it to its per-env prefix.
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://project-f-backups/OVERRIDE_ME_IN_OVERLAY"
      endpointURL: "https://axpravmkmffk.compat.objectstorage.us-phoenix-1.oraclecloud.com"
      s3Credentials:
        accessKeyId:
          name: postgres-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        immediateCheckpoint: true

  # Enable when you have Prometheus/Grafana in the cluster.
  monitoring:
    enablePodMonitor: false
