name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Lint + Format + Typecheck + Tests + Build
    if: |
      !startsWith(github.ref, 'refs/tags/')
      && !contains(github.event.head_commit.message, '[skip ci]')
    concurrency:
      group: quality-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # next build reads env at build time. Provide safe placeholders so the
      # build succeeds without needing the real staging/prod secrets in PR CI.
      # Real values are injected in docker build-args at image-build time.
      SKIP_ENV_VALIDATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Check (lint + format + typecheck + tests)
        run: bun run check

      - name: Build
        run: bun run build

  # Push to main → build STAGING image and bump overlay tag.
  # Gated on quality so a broken commit never produces a deployed image.
  build-staging:
    name: Build & push staging image
    if: |
      github.ref == 'refs/heads/main'
      && !contains(github.event.head_commit.message, '[skip ci]')
    needs: quality
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the tag bump back to main
      packages: write # push image to GHCR
    environment: staging
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "value=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=raw,value=staging-${{ steps.sha.outputs.value }}
          labels: |
            org.opencontainers.image.title=project-f (staging)

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Bump staging overlay image tag
        run: |
          yq eval '.images[0].newTag = "staging-${{ steps.sha.outputs.value }}"' \
            -i deploy/k8s/overlays/staging/app/kustomization.yaml
          echo "--- updated overlay ---"
          cat deploy/k8s/overlays/staging/app/kustomization.yaml

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No overlay changes to commit"
            exit 0
          fi
          git add deploy/k8s/overlays/staging/app/kustomization.yaml
          git commit -m "chore(deploy): staging @ ${{ steps.sha.outputs.value }} [skip ci]"
          git push origin HEAD:main

  # Git tag v*.*.* → build PRODUCTION image and bump overlay tag.
  # No quality dependency: tags are only cut from code that already passed CI on main.
  build-production:
    name: Build & push production image
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=project-f

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Bump production overlay image tag on main
        run: |
          # The tag lives at a commit on main. We need to commit the overlay bump to main, not the tag.
          VERSION="${GITHUB_REF#refs/tags/}"
          IMAGE_TAG="${VERSION#v}"
          git fetch origin main
          git checkout main
          git pull origin main --ff-only
          yq eval ".images[0].newTag = \"${IMAGE_TAG}\"" \
            -i deploy/k8s/overlays/production/app/kustomization.yaml
          echo "--- updated overlay ---"
          cat deploy/k8s/overlays/production/app/kustomization.yaml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No overlay changes to commit"
            exit 0
          fi
          git add deploy/k8s/overlays/production/app/kustomization.yaml
          git commit -m "chore(deploy): production @ ${VERSION} [skip ci]"
          git push origin main
