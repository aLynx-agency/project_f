name: Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same ref.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Format + Typecheck + Tests + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # next build reads env at build time. Provide safe placeholders so the
      # build succeeds without needing the real staging/prod secrets in PR CI.
      # Real values are injected in the docker.yml workflow at image-build time.
      SKIP_ENV_VALIDATION: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Check (lint + format + typecheck + tests)
        run: bun run check

      - name: Build
        run: bun run build
