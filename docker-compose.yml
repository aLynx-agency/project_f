services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d database -U username"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
